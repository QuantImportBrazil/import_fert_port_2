<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecionando...</title>
    <script>
        // ÚNICO LUGAR PARA EDITAR:
        const destino = "https://quantimportbrazil.github.io/cplx_port_rs_paises_fora_do_golfo_persico_adubos_ficut3_feateng0_fi_cut_reduc0.001_fev_26/";

        // 1. Redirecionamento imediato via JS
        window.location.href = destino;

        // 2. Cria a Meta Tag dinamicamente para garantir o redirecionamento
        const meta = document.createElement('meta');
        meta.httpEquiv = "refresh";
        meta.content = `0; url=${destino}`;
        document.getElementsByTagName('head')[0].appendChild(meta);

        // 3. Atualiza o link visual
        window.onload = function() {
            const link = document.getElementById("fallback-link");
            link.href = destino;
            link.innerHTML = destino;
        };
    </script>
</head>
<body>
    <p>Você está sendo redirecionado para:<br>
        <a id="fallback-link" href="#">Carregando...</a>
    </p>
</body>
</html>
